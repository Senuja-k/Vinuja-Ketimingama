services:
  backend:
    build: ./backend
    container_name: tokoxpress_backend
    restart: always
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=tokoexpress
      - DB_USERNAME=root
      - DB_PASSWORD=
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: tokoxpress_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: tokoxpress_db
    restart: always
    environment:
      - MYSQL_DATABASE=tokoexpress
      - MYSQL_ROOT_PASSWORD=
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
